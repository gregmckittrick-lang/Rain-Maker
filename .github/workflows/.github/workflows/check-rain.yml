name: Hourly Rain Check

on:
  schedule:
    # Runs at the top of every hour (UTC). GitHub Actions schedules can be
    # delayed a few minutes during high load, but it's reliably ~hourly.
    - cron: "0 * * * *"
  workflow_dispatch: {}  # lets you manually trigger a run from the Actions tab

jobs:
  check-rain:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rain check
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
        run: python check_rain.py
